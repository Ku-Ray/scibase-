<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 600 600"
  fill="none"
  role="img"
  aria-label="論文と分子構造の静物イラスト"
>
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#E8DDC9" stop-opacity="0.92" />
      <stop offset="60%" stop-color="#E8DDC9" stop-opacity="0.50" />
      <stop offset="100%" stop-color="#E8DDC9" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="paperEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F8F2E7" />
    </linearGradient>
  </defs>

  <!-- soft beige backdrop -->
  <circle cx="300" cy="300" r="280" fill="url(#bg)" />

  <!-- back paper sheet (rotated) -->
  <g transform="translate(300 320) rotate(-10) translate(-300 -320)">
    <rect
      x="138"
      y="148"
      width="240"
      height="320"
      rx="3"
      fill="url(#paperEdge)"
      stroke="#D4C4A6"
      stroke-width="1.2"
      opacity="0.85"
    />
  </g>

  <!-- second back sheet (rotated other way, smaller offset) -->
  <g transform="translate(300 320) rotate(4) translate(-300 -320)">
    <rect
      x="170"
      y="150"
      width="240"
      height="320"
      rx="3"
      fill="#FFFFFF"
      stroke="#D4C4A6"
      stroke-width="1.0"
      opacity="0.75"
    />
  </g>

  <!-- front paper sheet -->
  <rect
    x="180"
    y="140"
    width="240"
    height="320"
    rx="3"
    fill="#FFFFFF"
    stroke="#3D2B5C"
    stroke-width="1.2"
    stroke-opacity="0.38"
  />

  <!-- header band on front sheet -->
  <rect x="200" y="166" width="86" height="6" rx="1" fill="#3D2B5C" opacity="0.55" />
  <rect x="200" y="178" width="48" height="3.5" rx="1" fill="#3D2B5C" opacity="0.28" />

  <!-- text lines on front sheet -->
  <g stroke="#3D2B5C" stroke-width="1.6" stroke-linecap="round" opacity="0.42">
    <line x1="200" y1="208" x2="392" y2="208" />
    <line x1="200" y1="226" x2="368" y2="226" />
    <line x1="200" y1="244" x2="384" y2="244" />
  </g>
  <g stroke="#3D2B5C" stroke-width="1.1" stroke-linecap="round" opacity="0.26">
    <line x1="200" y1="270" x2="372" y2="270" />
    <line x1="200" y1="284" x2="356" y2="284" />
    <line x1="200" y1="298" x2="380" y2="298" />
    <line x1="200" y1="312" x2="320" y2="312" />
  </g>

  <!-- highlighted abstract data table -->
  <rect x="200" y="332" width="200" height="44" rx="2" fill="#3D2B5C" opacity="0.07" />
  <g stroke="#3D2B5C" stroke-width="1.1" stroke-linecap="round" opacity="0.34">
    <line x1="208" y1="346" x2="278" y2="346" />
    <line x1="294" y1="346" x2="338" y2="346" />
    <line x1="354" y1="346" x2="392" y2="346" />
    <line x1="208" y1="362" x2="262" y2="362" />
    <line x1="278" y1="362" x2="320" y2="362" />
    <line x1="336" y1="362" x2="392" y2="362" />
  </g>

  <!-- bottom citation lines -->
  <g stroke="#3D2B5C" stroke-width="1" stroke-linecap="round" opacity="0.22">
    <line x1="200" y1="394" x2="384" y2="394" />
    <line x1="200" y1="408" x2="304" y2="408" />
    <line x1="200" y1="422" x2="356" y2="422" />
  </g>

  <!-- ── molecular network (6 hex cluster, foreground right-bottom) ── -->
  <g transform="translate(420 410)">
    <!-- bond lines (drawn first, behind hexes) -->
    <g stroke="#3D2B5C" stroke-width="1.6" opacity="0.45">
      <line x1="0" y1="0" x2="69.28" y2="-40" />
      <line x1="0" y1="0" x2="69.28" y2="40" />
      <line x1="0" y1="0" x2="-69.28" y2="-40" />
      <line x1="69.28" y1="-40" x2="138.56" y2="0" />
      <line x1="69.28" y1="40" x2="138.56" y2="0" />
      <line x1="-69.28" y1="-40" x2="-69.28" y2="-120" />
    </g>
    <!-- hex 1 (center, filled) -->
    <polygon
      points="0,-40 34.64,-20 34.64,20 0,40 -34.64,20 -34.64,-20"
      fill="#3D2B5C"
    />
    <!-- hex 2 (top-right outline) -->
    <polygon
      points="69.28,-80 103.92,-60 103.92,-20 69.28,0 34.64,-20 34.64,-60"
      fill="none"
      stroke="#3D2B5C"
      stroke-width="2"
      opacity="0.85"
    />
    <!-- hex 3 (bottom-right outline) -->
    <polygon
      points="69.28,0 103.92,20 103.92,60 69.28,80 34.64,60 34.64,20"
      fill="none"
      stroke="#3D2B5C"
      stroke-width="2"
      opacity="0.7"
    />
    <!-- hex 4 (right edge filled translucent) -->
    <polygon
      points="138.56,-40 173.2,-20 173.2,20 138.56,40 103.92,20 103.92,-20"
      fill="#3D2B5C"
      opacity="0.18"
      stroke="#3D2B5C"
      stroke-width="2"
    />
    <!-- hex 5 (top-left outline) -->
    <polygon
      points="-69.28,-80 -34.64,-60 -34.64,-20 -69.28,0 -103.92,-20 -103.92,-60"
      fill="none"
      stroke="#3D2B5C"
      stroke-width="2"
      opacity="0.6"
    />
    <!-- hex 6 (top-far-left outline, dashed) -->
    <polygon
      points="-69.28,-160 -34.64,-140 -34.64,-100 -69.28,-80 -103.92,-100 -103.92,-140"
      fill="none"
      stroke="#3D2B5C"
      stroke-width="1.6"
      stroke-dasharray="4 3"
      opacity="0.42"
    />
    <!-- bond accent dots (beige) -->
    <circle cx="34.64" cy="-20" r="3.6" fill="#C4A882" />
    <circle cx="34.64" cy="20" r="3.6" fill="#C4A882" />
    <circle cx="-34.64" cy="-20" r="3.2" fill="#C4A882" />
    <circle cx="103.92" cy="-20" r="2.8" fill="#C4A882" opacity="0.85" />
    <circle cx="103.92" cy="20" r="2.8" fill="#C4A882" opacity="0.85" />
    <!-- center hex highlight -->
    <circle cx="0" cy="0" r="6" fill="#C4A882" opacity="0.95" />
  </g>

  <!-- capsule, tilted, top-right corner -->
  <g transform="translate(478 168) rotate(-32)">
    <rect x="-46" y="-13" width="92" height="26" rx="13" fill="#C4A882" />
    <path
      d="M -33 -13 L -46 -13 A 13 13 0 0 0 -46 13 L -33 13 Z"
      fill="#3D2B5C"
    />
    <line
      x1="-2"
      y1="-11"
      x2="38"
      y2="-11"
      stroke="#FFFFFF"
      stroke-width="2"
      stroke-linecap="round"
      opacity="0.6"
    />
  </g>

  <!-- secondary capsule (smaller, behind, layered depth) -->
  <g transform="translate(420 130) rotate(-14)">
    <rect x="-30" y="-9" width="60" height="18" rx="9" fill="#C4A882" opacity="0.55" />
    <path
      d="M -22 -9 L -30 -9 A 9 9 0 0 0 -30 9 L -22 9 Z"
      fill="#3D2B5C"
      opacity="0.55"
    />
  </g>

  <!-- droplet (left bottom) -->
  <g transform="translate(150 458)">
    <path
      d="M 0 0 C -7 -12, -12 -19, 0 -27 C 12 -19, 7 -12, 0 0 Z"
      fill="#3D2B5C"
      opacity="0.7"
    />
  </g>

  <!-- second tiny droplet for rhythm -->
  <g transform="translate(168 478)">
    <circle cx="0" cy="0" r="3.5" fill="#C4A882" opacity="0.85" />
  </g>

  <!-- accent dot constellation (subtle scientific feel, top-left) -->
  <g fill="#3D2B5C" opacity="0.4">
    <circle cx="118" cy="178" r="2.5" />
    <circle cx="138" cy="158" r="1.8" />
    <circle cx="108" cy="200" r="1.6" />
    <circle cx="146" cy="194" r="2" />
  </g>
</svg>
